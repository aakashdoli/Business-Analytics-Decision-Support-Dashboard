version: '3.8'

services:
  db:
    image: postgres:15
    container_name: analytics_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: business_analytics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: analytics_app
    ports:
      - "8501:8501"
    environment:
      - DATABASE_URL=postgresql://admin:admin123@db:5432/business_analytics
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin123
    depends_on:
      - db

volumes:
  postgres_data:
